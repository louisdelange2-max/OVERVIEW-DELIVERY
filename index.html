<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f7a2d"><title>HFQ Order Overview</title><link rel="manifest" href="manifest.json">
<style>
:root{--bg:#f4f8f3;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbe5d8;--blue:#075bd8;--green:#16a34a;--green2:#0f7a2d;--red:#dc2626;--amber:#b45309;--shadow:0 8px 24px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#e8f8ec 0,#f7fbf6 240px,#f4f8f3);color:var(--ink)}
button,input,select{font:inherit}button{border:0;border-radius:15px;padding:13px 16px;font-weight:900;background:linear-gradient(180deg,#22c55e,#15803d);color:#fff;box-shadow:0 5px 14px rgba(21,128,61,.22);cursor:pointer}button.secondary{background:#eef8ef;color:#0f7a2d;box-shadow:none;border:1px solid #cdebd2}button:disabled{opacity:.55;cursor:not-allowed}
.wrap{max-width:1050px;margin:0 auto;padding:12px 12px 90px}.top{background:linear-gradient(160deg,#064e1f,#16a34a 55%,#0f7a2d);color:#fff;border-radius:0 0 28px 28px;padding:18px 16px 22px;box-shadow:0 12px 35px rgba(21,128,61,.25);text-align:center}.top img{width:94px;height:72px;object-fit:contain;border-radius:18px}.top h1{margin:4px 0 2px;font-size:25px}.top p{margin:0;color:#dcfce7}.bar{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:12px}.pill{border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.12);font-size:12px}
.tabs{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(2,1fr);z-index:10;box-shadow:0 -6px 22px rgba(15,23,42,.08)}.tabs button{border-radius:0;background:#fff;color:#64748b;padding:12px 4px;font-size:13px;box-shadow:none}.tabs button.active{color:#15803d;border-top:3px solid #16a34a}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:12px 0}.status{border-radius:16px;padding:12px;margin:12px 0}.ok{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534}.error{background:#fff1f2;border:1px solid #fecdd3;color:#991b1b}.muted{color:var(--muted);font-size:13px}.search,input,select{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;color:#0f172a}.search{flex:1;min-width:210px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}.stat b{font-size:24px}.stat span{display:block;color:var(--muted);font-size:12px;margin-top:3px}@media(max-width:650px){.stats{grid-template-columns:1fr}.top h1{font-size:22px}}
.company,.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);margin:14px 0;overflow:hidden}.companyHead{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#eefbf1;border-bottom:1px solid var(--line);padding:14px 16px}.companyHead h2{margin:0;color:#0f7a2d;font-size:18px}.companyHead .small{font-size:12px;color:#334155;text-align:right}.orders{display:grid;gap:10px;padding:12px}.order{border:1px solid #bbf7d0;background:#f0fdf4;border-radius:18px;padding:12px}.order.low{border-color:#f59e0b;background:#fffbeb}.order.done{border-color:#ef4444;background:#fff1f2}.orderTitle{display:flex;gap:8px;justify-content:space-between;align-items:flex-start}.orderTitle b{color:#0f7a2d}.done .orderTitle b{color:#991b1b}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}.cell span{display:block;font-size:11px;color:#64748b}.cell b{font-size:13px;color:#0f7a2d}.done .cell b{color:#991b1b}@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}}
.details{margin-top:10px;border-top:1px dashed #a7dcb0;padding-top:10px}.details summary{cursor:pointer;font-weight:900;color:#0f7a2d}.hist{margin-top:8px;display:grid;gap:6px}.histRow{display:grid;grid-template-columns:1.3fr .8fr .8fr;gap:8px;background:rgba(255,255,255,.65);border:1px solid #d9f7df;border-radius:12px;padding:8px;font-size:12px}.histRow span{color:#64748b}.empty{background:#fff;border:1px solid var(--line);border-radius:22px;padding:20px;text-align:center;color:#64748b}.card{padding:16px}.card h2{margin:0 0 12px;font-size:20px}.formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.formGrid label{font-size:12px;font-weight:900;color:#334155}.formGrid label span{display:block;margin:0 0 6px}@media(max-width:700px){.formGrid{grid-template-columns:1fr}}
</style></head><body>
<div class="top"><img src="icons/icon-192.png" alt=""><h1>HFQ Order Overview</h1><p>Orders grouped per company • Individual orders tracked</p><div class="bar"><span class="pill">Order Balances</span><span class="pill">Individual Orders</span><span class="pill">SA Time</span></div></div>
<div class="wrap"><div id="msg"></div><main id="view"></main></div>
<nav class="tabs"><button id="tabOrders" class="active" onclick="showTab('orders')">Orders</button><button id="tabAdd" onclick="showTab('add')">Add Order</button></nav>
<script>
(function(){'use strict';
var API='https://script.google.com/macros/s/AKfycbxm2BBf8L1jkU-moYJsg8UzH8H9KuqFzi7FEZkn6zUJdkQGLdd3PonYis3kaGq4gy8Q/exec';
var DB_NAME='hfqOrderOverviewDB', DB_VER=3;
var state={tab:'orders',orders:[],individualOrders:[],entries:[],customers:[],sites:[],materials:[],busy:false,lastSync:'',latestUpdatedAt:'',dbReady:false};
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function num(v){var n=parseFloat(v);return isNaN(n)?0:n}
function fmt(n){return (Math.round(num(n)*100)/100).toFixed(2)}
function dateVal(v){if(!v)return 0;var s=String(v).trim();var d;if(/[zZ]$|[+-]\d{2}:?\d{2}$/.test(s)){d=new Date(s)}else{d=new Date(s.replace(' ','T'))}var t=d.getTime();return isNaN(t)?0:t}
function fmtSA(v){if(!v)return '';var s=String(v).trim();var d;if(/[zZ]$|[+-]\d{2}:?\d{2}$/.test(s)){d=new Date(s)}else{d=new Date(s.replace(' ','T'))}if(isNaN(d.getTime()))return s;return new Intl.DateTimeFormat('sv-SE',{timeZone:'Africa/Johannesburg',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(d).replace(' ',' ')}
function nowSA(){return new Intl.DateTimeFormat('sv-SE',{timeZone:'Africa/Johannesburg',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date()).replace(' ',' ')}
function uid(){return 'ORD-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7).toUpperCase()}
function msg(t,cls){$('msg').innerHTML=t?'<div class="status '+(cls||'ok')+'">'+esc(t)+'</div>':''}
function orderKey(o){return [o.customer||o.company,o.site,o.material,o.unit].map(function(x){return String(x||'').trim().toUpperCase()}).join('|')}
function groupName(o){return String(o.company||o.customer||o.client||'Unknown Company').trim()||'Unknown Company'}

var dbp=null;
function openDB(){
  if(dbp)return dbp;
  dbp=new Promise(function(resolve,reject){
    if(!('indexedDB' in window)){reject(new Error('IndexedDB not supported'));return}
    var req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      ['orders','individualOrders','entries'].forEach(function(s){if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'});});
      ['customers','sites','materials','meta'].forEach(function(s){if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'key'});});
    };
    req.onsuccess=function(){resolve(req.result)};
    req.onerror=function(){reject(req.error||new Error('IndexedDB open failed'))};
  });
  return dbp;
}
function txStore(store,mode,fn){
  return openDB().then(function(db){return new Promise(function(resolve,reject){
    var tx=db.transaction(store,mode||'readonly'), st=tx.objectStore(store), res;
    tx.oncomplete=function(){resolve(res)};
    tx.onerror=function(){reject(tx.error)};
    res=fn(st);
  })});
}
function getAll(store){return txStore(store,'readonly',function(st){return new Promise(function(resolve,reject){var r=st.getAll();r.onsuccess=function(){resolve(r.result||[])};r.onerror=function(){reject(r.error)}})}).then(function(x){return x&&typeof x.then==='function'?x:[]})}
function putAll(store,items,clearFirst){
  items=items||[];
  return txStore(store,'readwrite',function(st){
    if(clearFirst)st.clear();
    items.forEach(function(x,i){if(!x)return;var row=Object.assign({},x);if(!row.id)row.id=row.key||String(row.value||row.name||i);st.put(row);});
  });
}
function putMaster(store,arr){
  return txStore(store,'readwrite',function(st){
    st.clear();
    (arr||[]).forEach(function(v){if(String(v||'').trim())st.put({key:String(v),value:String(v)});});
  });
}
function getMaster(store){return getAll(store).then(function(rows){return rows.map(function(r){return r.value||r.key}).filter(String)})}
function putMeta(k,v){return txStore('meta','readwrite',function(st){st.put({key:k,value:v})})}
function getMeta(k){return txStore('meta','readonly',function(st){return new Promise(function(resolve,reject){var r=st.get(k);r.onsuccess=function(){resolve(r.result?r.result.value:'')};r.onerror=function(){reject(r.error)}})}).then(function(x){return x&&typeof x.then==='function'?x:''})}
function loadLocalFallback(){try{var s=JSON.parse(localStorage.getItem('hfqOrderViewerV2')||localStorage.getItem('hfqOrderViewer')||'{}');Object.assign(state,s)}catch(e){} state.busy=false;}
function saveLocalFallback(){var s=Object.assign({},state,{busy:false,dbReady:false});localStorage.setItem('hfqOrderViewerV2',JSON.stringify(s));}
function loadPhone(){
  loadLocalFallback();
  return Promise.all([getAll('orders'),getAll('individualOrders'),getAll('entries'),getMaster('customers'),getMaster('sites'),getMaster('materials'),getMeta('lastSync'),getMeta('latestUpdatedAt')]).then(function(r){
    if(r[0].length)state.orders=r[0]; if(r[1].length)state.individualOrders=r[1]; if(r[2].length)state.entries=r[2];
    if(r[3].length)state.customers=r[3]; if(r[4].length)state.sites=r[4]; if(r[5].length)state.materials=r[5];
    state.lastSync=r[6]||state.lastSync||''; state.latestUpdatedAt=r[7]||state.latestUpdatedAt||''; state.dbReady=true; state.busy=false;
  }).catch(function(){state.dbReady=false;});
}
function savePhone(){
  saveLocalFallback();
  return Promise.all([
    putAll('orders',state.orders,true),putAll('individualOrders',state.individualOrders,true),putAll('entries',state.entries,true),
    putMaster('customers',state.customers),putMaster('sites',state.sites),putMaster('materials',state.materials),
    putMeta('lastSync',state.lastSync||''),putMeta('latestUpdatedAt',state.latestUpdatedAt||'')
  ]).catch(function(){});
}
function mergeById(oldArr,newArr){
  var map={};(oldArr||[]).forEach(function(x){if(x&&x.id)map[String(x.id)]=x;});
  (newArr||[]).forEach(function(x){if(x&&x.id)map[String(x.id)]=Object.assign({},map[String(x.id)]||{},x);});
  return Object.keys(map).map(function(k){return map[k]});
}
function api(data){return fetch(API,{method:'POST',body:JSON.stringify(data)}).then(function(r){return r.text()}).then(function(t){try{return JSON.parse(t)}catch(e){throw new Error(t.slice(0,240)||'Bad server response')}})}
function deltaApi(payload){
  return api(Object.assign({action:'getMastersDelta'},payload)).then(function(res){
    if(res && res.ok===false && /Unknown action/i.test(String(res.error||''))) return api(Object.assign({action:'getMasterChanges'},payload));
    return res;
  });
}
function applyPayload(res,full){
  if(res.changed===false){state.lastSync=nowSA(); if(res.latestUpdatedAt)state.latestUpdatedAt=res.latestUpdatedAt; return;}
  if(full || res.full || Array.isArray(res.orders)) state.orders = Array.isArray(res.orders) ? res.orders : state.orders;
  if(Array.isArray(res.individualOrders)||Array.isArray(res.orderLines)) state.individualOrders = res.individualOrders||res.orderLines;
  if(Array.isArray(res.entries)) state.entries = res.entriesDelta ? mergeById(state.entries,res.entries) : res.entries;
  if(Array.isArray(res.customers))state.customers=res.customers;
  if(Array.isArray(res.sites))state.sites=res.sites;
  if(Array.isArray(res.materials))state.materials=res.materials;
  state.lastSync=nowSA();
  state.latestUpdatedAt=res.latestUpdatedAt||res.time||state.lastSync;
}
function setBusy(on,text){state.busy=!!on;Array.prototype.forEach.call(document.querySelectorAll('button'),function(b){if(!b.id||b.id.indexOf('tab')!==0)b.disabled=state.busy});var d=$('downloadBtn');if(d)d.textContent=state.busy?(text||'Working...'):'Sync Changes';var s=$('saveOrderBtn');if(s)s.textContent=state.busy?(text||'Saving...'):'Save Order';if(!state.busy)savePhone();}
function individualFor(o){var key=orderKey(o);return (state.individualOrders||[]).filter(function(x){return orderKey(x)===key}).sort(function(a,b){return dateVal(b.createdAt||b.updatedAt||'')-dateVal(a.createdAt||a.updatedAt||'')})}
function lineStatusFor(o){var lines=(o._lines||[]).slice().sort(function(a,b){return dateVal(a.createdAt||a.updatedAt||'')-dateVal(b.createdAt||b.updatedAt||'')});var delivered=num(o._delivered),map={};lines.forEach(function(x){var q=num(x.orderQty||x.qty||x.quantity||0),used=Math.min(q,Math.max(0,delivered));delivered-=used;var left=Math.max(0,q-used);map[x.id||((x.createdAt||'')+'|'+q)]={left:left,used:used,status:left<=0?'COMPLETED':'OPEN'}});return map}
function deliveredFor(o){var key=orderKey(o);return (state.entries||[]).filter(function(e){return orderKey(e)===key}).reduce(function(s,e){return s+num(e.qty)},0)}
window.showTab=function(tab){state.tab=tab;msg('');render()}
window.downloadOrders=function(fullRefresh){
  if(state.busy)return;
  var first=!(state.orders&&state.orders.length);
  var full=fullRefresh===true || first;
  setBusy(true,full?'Downloading full data...':'Syncing changes...');
  msg(full?'First download: saving data on phone...':'Checking for changes only...','ok');
  deltaApi({since:state.latestUpdatedAt||state.lastSync||'',lastMasterSyncAt:state.latestUpdatedAt||state.lastSync||'',fullRefresh:full}).then(function(res){
    if(!res.ok)throw new Error(res.error||'Sync failed');
    applyPayload(res,full); return savePhone().then(function(){render();
      var changed=res.changed===false?'No changes':((res.changedMasters||[]).join(', ')||'Updated');
      msg(changed+' • '+state.orders.length+' balances • '+(state.individualOrders||[]).length+' individual orders • '+state.lastSync,'ok');
    });
  }).catch(function(e){
    msg('Sync failed: '+e.message+'. Showing saved phone data.','error');render();
  }).finally(function(){setBusy(false)});
}
window.fullDownload=function(){state.latestUpdatedAt='';window.downloadOrders(true)}
window.saveOrder=function(){
  if(state.busy)return;
  var customer=$('customer').value.trim(),site=$('site').value.trim(),material=$('material').value.trim(),qty=num($('qty').value),unit=$('unit').value;
  if(!customer||!site||!material||!qty||!unit){msg('Complete company, site, material, qty and unit.','error');return}
  var pin=prompt('Enter order PIN from Google Sheets');if(pin===null)return;pin=String(pin||'').trim();if(!pin){msg('PIN is required to save order.','error');return}
  var rec={id:uid(),customer:customer,company:customer,site:site,material:material,orderQty:qty,unit:unit,createdAt:nowSA(),updatedAt:nowSA()};
  setBusy(true,'Saving order...');msg('Checking PIN and saving order...','ok');
  api({action:'saveOrder',order:rec,adminCode:pin}).then(function(res){
    if(!res.ok)throw new Error(res.error||'PIN wrong or save failed');
    applyPayload(res,true); state.customers=Array.from(new Set((state.customers||[]).concat([customer]))); state.sites=Array.from(new Set((state.sites||[]).concat([site]))); state.materials=Array.from(new Set((state.materials||[]).concat([material])));
    state.tab='orders'; return savePhone().then(function(){render();msg('Order saved to Google Sheets and phone.','ok')});
  }).catch(function(e){msg('Order was not saved: '+e.message,'error')}).finally(function(){setBusy(false)});
}
function renderOrders(){
  var q=String(($('search')&&$('search').value)||'').toLowerCase();
  var enriched=(state.orders||[]).map(function(o){var delivered=num(o.deliveredQty);if(!delivered)delivered=deliveredFor(o);var ordered=num(o.orderQty||o.qty||o.quantity),left=(o.qtyLeft!=null&&o.qtyLeft!=='')?num(o.qtyLeft):Math.max(0,ordered-delivered);var lines=individualFor(o);return Object.assign({},o,{_delivered:delivered,_ordered:ordered,_left:left,_company:groupName(o),_lines:lines})}).filter(function(o){return !q||[o._company,o.site,o.material,o.unit].join(' ').toLowerCase().indexOf(q)>=0}).sort(function(a,b){return a._company.localeCompare(b._company)||String(a.site||'').localeCompare(String(b.site||''))||String(a.material||'').localeCompare(String(b.material||''))});
  var groups={};enriched.forEach(function(o){(groups[o._company]=groups[o._company]||[]).push(o)});
  $('view').innerHTML='<div class="toolbar"><button id="downloadBtn" onclick="downloadOrders()">Sync Changes</button><button class="secondary" onclick="fullDownload()">Full Refresh</button><input id="search" class="search" placeholder="Search company, site or material" oninput="render()" value="'+esc(q)+'"></div><div class="stats"><div class="stat"><b>'+enriched.length+'</b><span>Order Balances</span></div><div class="stat"><b>'+enriched.filter(function(o){return o._left>0}).length+'</b><span>Open Balances</span></div><div class="stat"><b>'+(state.individualOrders||[]).length+'</b><span>Individual Orders</span></div></div>'+(state.lastSync?'<p class="muted">Last sync: '+esc(state.lastSync)+' • Saved on phone with IndexedDB</p>':'<p class="muted">First sync will save orders on this phone.</p>')+(Object.keys(groups).sort().map(function(c){var list=groups[c],total=list.reduce(function(s,o){return s+o._left},0);return '<section class="company"><div class="companyHead"><h2>'+esc(c)+'</h2><div class="small">'+list.length+' balances<br>'+esc(fmt(total))+' total left</div></div><div class="orders">'+list.map(function(o){var done=o._left<=0,low=o._left>0&&o._left<=50;var lineMap=lineStatusFor(o);var hist=(o._lines||[]).map(function(x){var k=x.id||((x.createdAt||'')+'|'+num(x.orderQty||x.qty||x.quantity||0));var st=lineMap[k]||{status:(x.status||'OPEN'),left:num(x.orderQty||x.qty||0)};return '<div class="histRow"><div><b>'+esc(fmt(x.orderQty||x.qty||0))+' '+esc(x.unit||o.unit||'')+'</b><br><span>'+esc(x.id||'')+'</span></div><div><span>Created</span><br>'+esc(fmtSA(x.createdAt||x.updatedAt||''))+'</div><div><span>Status</span><br>'+esc(st.status)+'</div></div>'}).join('');return '<article class="order '+(done?'done':low?'low':'')+'"><div class="orderTitle"><b>ORDER BALANCE</b>'+(done?'<b>ORDER COMPLETED</b>':low?'<b style="color:#92400e">LOW BALANCE</b>':'')+'</div><div class="grid"><div class="cell"><span>Total Ordered</span><b>'+esc(fmt(o._ordered))+' '+esc(o.unit||'')+'</b></div><div class="cell"><span>Delivered</span><b>'+esc(fmt(o._delivered))+' '+esc(o.unit||'')+'</b></div><div class="cell"><span>Qty Left</span><b>'+esc(fmt(o._left))+' '+esc(o.unit||'')+'</b></div><div class="cell"><span>Order</span><b>'+esc((o.site||'')+' / '+(o.material||''))+'</b></div></div><details class="details"><summary>'+(o._lines&&o._lines.length?o._lines.length:'No')+' individual order line(s)</summary><div class="hist">'+(hist||'<div class="muted">No individual order lines returned by backend yet.</div>')+'</div></details></article>'}).join('')+'</div></section>'}).join('')||'<div class="empty">No orders on phone yet. Press Sync Changes.</div>');setBusy(state.busy);
}
function renderAdd(){
  $('view').innerHTML='<section class="card"><h2>Add Order</h2><p class="muted">When you press Save Order, enter the PIN/password from Google Sheets. The order saves to Google Sheets and then this phone.</p><div class="formGrid"><label><span>Company / Client</span><input id="customer" list="customers" placeholder="Company name"></label><label><span>Site</span><input id="site" list="sites" placeholder="Site name"></label><label><span>Material / Product</span><input id="material" list="materials" placeholder="Material"></label><label><span>Order Qty</span><input id="qty" type="number" step="0.01" min="0" placeholder="0.00"></label><label><span>Unit</span><select id="unit"><option value="">Select unit</option><option>Tons</option><option>m³</option></select></label></div><datalist id="customers">'+(state.customers||[]).map(function(x){return '<option value="'+esc(x)+'">'}).join('')+'</datalist><datalist id="sites">'+(state.sites||[]).map(function(x){return '<option value="'+esc(x)+'">'}).join('')+'</datalist><datalist id="materials">'+(state.materials||[]).map(function(x){return '<option value="'+esc(x)+'">'}).join('')+'</datalist><div class="toolbar"><button id="saveOrderBtn" onclick="saveOrder()">Save Order</button><button class="secondary" onclick="showTab(\'orders\')">Back to Orders</button></div></section>';setBusy(state.busy);
}
window.render=function(){ $('tabOrders').className=state.tab==='orders'?'active':'';$('tabAdd').className=state.tab==='add'?'active':''; if(state.tab==='add')renderAdd();else renderOrders();}
loadPhone().then(function(){render();setTimeout(function(){if(navigator.onLine!==false)downloadOrders();else msg('Offline. Showing saved orders from phone.','error')},300);});
if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js?v=1.3.0').catch(function(){});
})();
</script></body></html>
