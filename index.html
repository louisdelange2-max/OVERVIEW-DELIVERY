<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f7a2d"><title>HFQ Order Overview</title><link rel="manifest" href="manifest.json">
<style>
:root{--bg:#f4f8f3;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbe5d8;--blue:#075bd8;--green:#16a34a;--green2:#0f7a2d;--red:#dc2626;--amber:#b45309;--shadow:0 8px 24px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#e8f8ec 0,#f7fbf6 240px,#f4f8f3);color:var(--ink)}
button,input,select{font:inherit}button{border:0;border-radius:15px;padding:13px 16px;font-weight:900;background:linear-gradient(180deg,#22c55e,#15803d);color:#fff;box-shadow:0 5px 14px rgba(21,128,61,.22);cursor:pointer}button.secondary{background:#eef8ef;color:#0f7a2d;box-shadow:none;border:1px solid #cdebd2}button:disabled{opacity:.55;cursor:not-allowed}
.wrap{max-width:1050px;margin:0 auto;padding:12px 12px 90px}.top{background:linear-gradient(160deg,#064e1f,#16a34a 55%,#0f7a2d);color:#fff;border-radius:0 0 28px 28px;padding:18px 16px 22px;box-shadow:0 12px 35px rgba(21,128,61,.25);text-align:center}.top img{width:94px;height:72px;object-fit:contain;border-radius:18px}.top h1{margin:4px 0 2px;font-size:25px}.top p{margin:0;color:#dcfce7}.bar{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:12px}.pill{border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.12);font-size:12px}
.tabs{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(2,1fr);z-index:10;box-shadow:0 -6px 22px rgba(15,23,42,.08)}.tabs button{border-radius:0;background:#fff;color:#64748b;padding:12px 4px;font-size:13px;box-shadow:none}.tabs button.active{color:#15803d;border-top:3px solid #16a34a}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:12px 0}.status{border-radius:16px;padding:12px;margin:12px 0}.ok{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534}.error{background:#fff1f2;border:1px solid #fecdd3;color:#991b1b}.muted{color:var(--muted);font-size:13px}.search,input,select{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;color:#0f172a}.search{flex:1;min-width:210px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}.stat b{font-size:24px}.stat span{display:block;color:var(--muted);font-size:12px;margin-top:3px}@media(max-width:650px){.stats{grid-template-columns:1fr}.top h1{font-size:22px}}
.company,.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);margin:14px 0;overflow:hidden}.companyHead{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#eefbf1;border-bottom:1px solid var(--line);padding:14px 16px}.companyHead h2{margin:0;color:#0f7a2d;font-size:18px}.companyHead .small{font-size:12px;color:#334155;text-align:right}.orders{display:grid;gap:10px;padding:12px}.order{border:1px solid #bbf7d0;background:#f0fdf4;border-radius:18px;padding:12px}.order.low{border-color:#f59e0b;background:#fffbeb}.order.done{border-color:#ef4444;background:#fff1f2}.orderTitle{display:flex;gap:8px;justify-content:space-between;align-items:flex-start}.orderTitle b{color:#0f7a2d}.done .orderTitle b{color:#991b1b}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}.cell span{display:block;font-size:11px;color:#64748b}.cell b{font-size:13px;color:#0f7a2d}.done .cell b{color:#991b1b}@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}}
.empty{background:#fff;border:1px solid var(--line);border-radius:22px;padding:20px;text-align:center;color:#64748b}.card{padding:16px}.card h2{margin:0 0 12px;font-size:20px}.formGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.formGrid label{font-size:12px;font-weight:900;color:#334155}.formGrid label span{display:block;margin:0 0 6px}@media(max-width:700px){.formGrid{grid-template-columns:1fr}}
</style></head><body>
<div class="top"><img src="icons/icon-192.png" alt=""><h1>HFQ Order Overview</h1><p>Orders grouped per company • Auto download on open</p><div class="bar"><span class="pill">Order Balances</span><span class="pill">Add Orders</span><span class="pill">SA Time</span></div></div>
<div class="wrap"><div id="msg"></div><main id="view"></main></div>
<nav class="tabs"><button id="tabOrders" class="active" onclick="showTab('orders')">Orders</button><button id="tabAdd" onclick="showTab('add')">Add Order</button></nav>
<script>
(function(){'use strict';
var API='https://script.google.com/macros/s/AKfycbxm2BBf8L1jkU-moYJsg8UzH8H9KuqFzi7FEZkn6zUJdkQGLdd3PonYis3kaGq4gy8Q/exec';
var state={tab:'orders',orders:[],entries:[],customers:[],sites:[],materials:[],busy:false,lastSync:''};
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function num(v){var n=parseFloat(v);return isNaN(n)?0:n}
function fmt(n){return (Math.round(num(n)*100)/100).toFixed(2)}
function nowSA(){return new Intl.DateTimeFormat('sv-SE',{timeZone:'Africa/Johannesburg',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date()).replace(' ',' ')}
function uid(){return 'ORD-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7).toUpperCase()}
function msg(t,cls){$('msg').innerHTML=t?'<div class="status '+(cls||'ok')+'">'+esc(t)+'</div>':''}
function save(){var s=Object.assign({},state,{busy:false});localStorage.setItem('hfqOrderViewerV2',JSON.stringify(s))}
function load(){try{var s=JSON.parse(localStorage.getItem('hfqOrderViewerV2')||localStorage.getItem('hfqOrderViewer')||'{}');Object.assign(state,s)}catch(e){} state.busy=false;}
function api(data){return fetch(API,{method:'POST',body:JSON.stringify(data)}).then(function(r){return r.text()}).then(function(t){try{return JSON.parse(t)}catch(e){throw new Error(t.slice(0,240)||'Bad server response')}})}
function setBusy(on,text){state.busy=!!on;Array.prototype.forEach.call(document.querySelectorAll('button'),function(b){if(!b.id||b.id.indexOf('tab')!==0)b.disabled=state.busy});var d=$('downloadBtn');if(d)d.textContent=state.busy?(text||'Working...'):'Download Orders';var s=$('saveOrderBtn');if(s)s.textContent=state.busy?(text||'Saving...'):'Save Order';if(!state.busy)save();}
function orderKey(o){return [o.customer||o.company,o.site,o.material,o.unit].map(function(x){return String(x||'').trim().toUpperCase()}).join('|')}
function deliveredFor(o){var key=orderKey(o);return (state.entries||[]).filter(function(e){return [e.customer||e.company,e.site,e.material,e.unit].map(function(x){return String(x||'').trim().toUpperCase()}).join('|')===key}).reduce(function(s,e){return s+num(e.qty)},0)}
function groupName(o){return String(o.company||o.customer||o.client||'Unknown Company').trim()||'Unknown Company'}
function options(arr,val,ph){var a=(arr||[]).slice().sort();return '<option value="">'+esc(ph||'Select')+'</option>'+a.map(function(x){return '<option '+(x===val?'selected':'')+'>'+esc(x)+'</option>'}).join('')}
window.showTab=function(tab){state.tab=tab;msg('');render()}
window.downloadOrders=function(){if(state.busy)return;setBusy(true,'Downloading orders...');msg('Downloading latest orders...','ok');api({action:'getMasters'}).then(function(res){if(!res.ok)throw new Error(res.error||'Download failed');state.orders=res.orders||[];state.entries=res.entries||[];state.customers=res.customers||state.customers||[];state.sites=res.sites||state.sites||[];state.materials=res.materials||state.materials||[];state.lastSync=nowSA();save();render();msg('Orders downloaded: '+state.orders.length+' • '+state.lastSync,'ok')}).catch(function(e){msg('Download failed: '+e.message,'error');render()}).finally(function(){setBusy(false)})}
window.saveOrder=function(){if(state.busy)return;var customer=$('customer').value.trim(),site=$('site').value.trim(),material=$('material').value.trim(),qty=num($('qty').value),unit=$('unit').value;if(!customer||!site||!material||!qty||!unit){msg('Complete company, site, material, qty and unit.','error');return}var pin=prompt('Enter order PIN from Google Sheets');if(pin===null)return;pin=String(pin||'').trim();if(!pin){msg('PIN is required to save order.','error');return}var rec={id:uid(),customer:customer,company:customer,site:site,material:material,orderQty:qty,unit:unit,updatedAt:new Intl.DateTimeFormat('sv-SE',{timeZone:'Africa/Johannesburg',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date()).replace(' ','T')};setBusy(true,'Saving order...');msg('Checking PIN and saving order...','ok');api({action:'saveOrder',order:rec,adminCode:pin}).then(function(res){if(!res.ok)throw new Error(res.error||'PIN wrong or save failed');state.orders=res.orders||state.orders.concat([rec]);state.customers=res.customers||Array.from(new Set((state.customers||[]).concat([customer])));state.sites=res.sites||Array.from(new Set((state.sites||[]).concat([site])));state.materials=res.materials||Array.from(new Set((state.materials||[]).concat([material])));state.lastSync=nowSA();save();state.tab='orders';render();msg('Order saved to Google Sheets.','ok')}).catch(function(e){msg('Order was not saved: '+e.message,'error')}).finally(function(){setBusy(false)})}
function renderOrders(){var q=String(($('search')&&$('search').value)||'').toLowerCase();var enriched=(state.orders||[]).map(function(o){var delivered=deliveredFor(o),ordered=num(o.orderQty||o.qty||o.quantity),left=Math.max(0,ordered-delivered);return Object.assign({},o,{_delivered:delivered,_ordered:ordered,_left:left,_company:groupName(o)})}).filter(function(o){return !q||[o._company,o.site,o.material,o.unit].join(' ').toLowerCase().indexOf(q)>=0}).sort(function(a,b){return a._company.localeCompare(b._company)||String(a.site||'').localeCompare(String(b.site||''))||String(a.material||'').localeCompare(String(b.material||''))});
var groups={};enriched.forEach(function(o){(groups[o._company]=groups[o._company]||[]).push(o)});
$('view').innerHTML='<div class="toolbar"><button id="downloadBtn" onclick="downloadOrders()">Download Orders</button><input id="search" class="search" placeholder="Search company, site or material" oninput="render()" value="'+esc(q)+'"></div><div class="stats"><div class="stat"><b>'+enriched.length+'</b><span>Orders</span></div><div class="stat"><b>'+enriched.filter(function(o){return o._left>0}).length+'</b><span>Open Orders</span></div><div class="stat"><b>'+enriched.filter(function(o){return o._left<=0}).length+'</b><span>Completed</span></div></div>'+(state.lastSync?'<p class="muted">Last download: '+esc(state.lastSync)+'</p>':'')+(Object.keys(groups).sort().map(function(c){var list=groups[c],total=list.reduce(function(s,o){return s+o._left},0);return '<section class="company"><div class="companyHead"><h2>'+esc(c)+'</h2><div class="small">'+list.length+' orders<br>'+esc(fmt(total))+' total left</div></div><div class="orders">'+list.map(function(o){var done=o._left<=0,low=o._left>0&&o._left<=50;return '<article class="order '+(done?'done':low?'low':'')+'"><div class="orderTitle"><b>ORDER BALANCE</b>'+(done?'<b>ORDER COMPLETED</b>':low?'<b style="color:#92400e">LOW BALANCE</b>':'')+'</div><div class="grid"><div class="cell"><span>Ordered</span><b>'+esc(fmt(o._ordered))+' '+esc(o.unit||'')+'</b></div><div class="cell"><span>Delivered</span><b>'+esc(fmt(o._delivered))+' '+esc(o.unit||'')+'</b></div><div class="cell"><span>Qty Left</span><b>'+esc(fmt(o._left))+' '+esc(o.unit||'')+'</b></div><div class="cell"><span>Order</span><b>'+esc((o.site||'')+' / '+(o.material||''))+'</b></div></div></article>'}).join('')+'</div></section>'}).join('')||'<div class="empty">No orders downloaded yet. Press Download Orders.</div>');setBusy(state.busy)}
function renderAdd(){ $('view').innerHTML='<section class="card"><h2>Add Order</h2><p class="muted">When you press Save Order, enter the PIN/password from Google Sheets. The order saves to Google Sheets and then refreshes this app.</p><div class="formGrid"><label><span>Company / Client</span><input id="customer" list="customers" placeholder="Company name"></label><label><span>Site</span><input id="site" list="sites" placeholder="Site name"></label><label><span>Material / Product</span><input id="material" list="materials" placeholder="Material"></label><label><span>Order Qty</span><input id="qty" type="number" step="0.01" min="0" placeholder="0.00"></label><label><span>Unit</span><select id="unit"><option value="">Select unit</option><option>Tons</option><option>m³</option></select></label></div><datalist id="customers">'+(state.customers||[]).map(function(x){return '<option value="'+esc(x)+'">'}).join('')+'</datalist><datalist id="sites">'+(state.sites||[]).map(function(x){return '<option value="'+esc(x)+'">'}).join('')+'</datalist><datalist id="materials">'+(state.materials||[]).map(function(x){return '<option value="'+esc(x)+'">'}).join('')+'</datalist><div class="toolbar"><button id="saveOrderBtn" onclick="saveOrder()">Save Order</button><button class="secondary" onclick="showTab(\'orders\')">Back to Orders</button></div></section>';setBusy(state.busy)}
window.render=function(){ $('tabOrders').className=state.tab==='orders'?'active':'';$('tabAdd').className=state.tab==='add'?'active':''; if(state.tab==='add')renderAdd();else renderOrders();}
load();state.busy=false;render();setTimeout(function(){if(navigator.onLine!==false)downloadOrders();else msg('Offline. Showing saved orders from phone.','error')},300);if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js?v=1.1.1').catch(function(){});
})();
</script></body></html>
