<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#075bd8"><title>HFQ Order Balances</title><link rel="manifest" href="manifest.json">
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbe5f3;--blue:#075bd8;--green:#16a34a;--red:#dc2626;--amber:#b45309;--shadow:0 8px 24px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#eaf3ff 0,#f7f9fc 240px,#f4f7fb);color:var(--ink)}
.wrap{max-width:1050px;margin:0 auto;padding:12px 12px 40px}.top{background:linear-gradient(160deg,#062b79,#075bd8 55%,#053b98);color:#fff;border-radius:0 0 28px 28px;padding:18px 16px 22px;box-shadow:0 12px 35px rgba(7,91,216,.25);text-align:center}.top img{width:90px;height:64px;object-fit:contain}.top h1{margin:4px 0 2px;font-size:25px}.top p{margin:0;color:#dbeafe}.bar{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:12px}.pill{border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.12);font-size:12px}
button{border:0;border-radius:15px;padding:13px 16px;font-weight:900;background:linear-gradient(180deg,#0968f0,#044fb9);color:#fff;box-shadow:0 5px 14px rgba(7,91,216,.22);cursor:pointer}button:disabled{opacity:.55;cursor:not-allowed}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:12px 0}.status{border-radius:16px;padding:12px;margin:12px 0}.ok{background:#ecfdf5;border:1px solid #bbf7d0;color:#166534}.error{background:#fff1f2;border:1px solid #fecdd3;color:#991b1b}.muted{color:var(--muted);font-size:13px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;text-align:center}.stat b{font-size:24px}.stat span{display:block;color:var(--muted);font-size:12px;margin-top:3px}@media(max-width:650px){.stats{grid-template-columns:1fr}.top h1{font-size:22px}}
.company{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);margin:14px 0;overflow:hidden}.companyHead{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#eef6ff;border-bottom:1px solid var(--line);padding:14px 16px}.companyHead h2{margin:0;color:#075bd8;font-size:18px}.companyHead .small{font-size:12px;color:#334155;text-align:right}.orders{display:grid;gap:10px;padding:12px}.order{border:1px solid #bfdbfe;background:#eff6ff;border-radius:18px;padding:12px}.order.low{border-color:#f59e0b;background:#fffbeb}.order.done{border-color:#ef4444;background:#fff1f2}.orderTitle{display:flex;gap:8px;justify-content:space-between;align-items:flex-start}.orderTitle b{color:#075bd8}.done .orderTitle b{color:#991b1b}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}.cell span{display:block;font-size:11px;color:#64748b}.cell b{font-size:13px;color:#075bd8}.done .cell b{color:#991b1b}@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}}
.search{flex:1;min-width:210px;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit}.empty{background:#fff;border:1px solid var(--line);border-radius:22px;padding:20px;text-align:center;color:#64748b}
</style></head><body>
<div class="top"><img src="icons/icon-192.png" alt=""><h1>HFQ Order Balances</h1><p>Grouped per company • Auto download on open</p><div class="bar"><span class="pill">One Screen</span><span class="pill">Manual Download</span><span class="pill">SA Time</span></div></div>
<div class="wrap"><div class="toolbar"><button id="downloadBtn" onclick="downloadOrders()">Download Orders</button><input id="search" class="search" placeholder="Search company, site or material" oninput="render()"></div><div id="msg"></div><div class="stats"><div class="stat"><b id="totalOrders">0</b><span>Orders</span></div><div class="stat"><b id="openOrders">0</b><span>Open Orders</span></div><div class="stat"><b id="doneOrders">0</b><span>Completed</span></div></div><main id="orders"></main></div>
<script>
(function(){'use strict';
var API='https://script.google.com/macros/s/AKfycbxm2BBf8L1jkU-moYJsg8UzH8H9KuqFzi7FEZkn6zUJdkQGLdd3PonYis3kaGq4gy8Q/exec';
var orders=[],entries=[],busy=false,lastSync='';
function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function num(v){var n=parseFloat(v);return isNaN(n)?0:n}
function fmt(n){return (Math.round(num(n)*100)/100).toFixed(2)}
function msg(t,cls){$('msg').innerHTML=t?'<div class="status '+(cls||'ok')+'">'+esc(t)+'</div>':''}
function setBusy(on,text){busy=!!on;$('downloadBtn').disabled=busy;$('downloadBtn').textContent=busy?(text||'Downloading...'):'Download Orders'}
function orderKey(o){return [o.customer||o.company,o.site,o.material,o.unit].map(function(x){return String(x||'').trim().toUpperCase()}).join('|')}
function deliveredFor(o){var key=orderKey(o);return entries.filter(function(e){return [e.customer||e.company,e.site,e.material,e.unit].map(function(x){return String(x||'').trim().toUpperCase()}).join('|')===key}).reduce(function(s,e){return s+num(e.qty)},0)}
function groupName(o){return String(o.company||o.customer||o.client||'Unknown Company').trim()||'Unknown Company'}
function api(data){return fetch(API,{method:'POST',body:JSON.stringify(data)}).then(function(r){return r.text()}).then(function(t){try{return JSON.parse(t)}catch(e){throw new Error(t.slice(0,240)||'Bad server response')}})}
window.downloadOrders=function(){if(busy)return;setBusy(true,'Downloading orders...');msg('Downloading latest orders...','ok');api({action:'getMasters'}).then(function(res){if(!res.ok)throw new Error(res.error||'Download failed');orders=res.orders||[];entries=res.entries||[];lastSync=new Intl.DateTimeFormat('sv-SE',{timeZone:'Africa/Johannesburg',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date()).replace(' ',' ');localStorage.setItem('hfqOrderViewer',JSON.stringify({orders:orders,entries:entries,lastSync:lastSync}));render();msg('Orders downloaded: '+orders.length+' • '+lastSync,'ok')}).catch(function(e){msg('Download failed: '+e.message,'error');render()}).finally(function(){setBusy(false)})}
function load(){try{var s=JSON.parse(localStorage.getItem('hfqOrderViewer')||'{}');orders=s.orders||[];entries=s.entries||[];lastSync=s.lastSync||''}catch(e){}}
window.render=function(){var q=String($('search').value||'').toLowerCase();var enriched=(orders||[]).map(function(o){var delivered=deliveredFor(o),ordered=num(o.orderQty||o.qty||o.quantity),left=Math.max(0,ordered-delivered);return Object.assign({},o,{_delivered:delivered,_ordered:ordered,_left:left,_company:groupName(o)})}).filter(function(o){return !q||[o._company,o.site,o.material,o.unit].join(' ').toLowerCase().indexOf(q)>=0}).sort(function(a,b){return a._company.localeCompare(b._company)||String(a.site||'').localeCompare(String(b.site||''))||String(a.material||'').localeCompare(String(b.material||''))});
$('totalOrders').textContent=enriched.length;$('openOrders').textContent=enriched.filter(function(o){return o._left>0}).length;$('doneOrders').textContent=enriched.filter(function(o){return o._left<=0}).length;
var groups={};enriched.forEach(function(o){(groups[o._company]=groups[o._company]||[]).push(o)});var html=Object.keys(groups).sort().map(function(c){var list=groups[c],total=list.reduce(function(s,o){return s+o._left},0);return '<section class="company"><div class="companyHead"><h2>'+esc(c)+'</h2><div class="small">'+list.length+' orders<br>'+esc(fmt(total))+' total left</div></div><div class="orders">'+list.map(function(o){var done=o._left<=0,low=o._left>0&&o._left<=50;return '<article class="order '+(done?'done':low?'low':'')+'"><div class="orderTitle"><b>ORDER BALANCE</b>'+(done?'<b>ORDER COMPLETED</b>':low?'<b style="color:#92400e">LOW BALANCE</b>':'')+'</div><div class="grid"><div class="cell"><span>Ordered</span><b>'+esc(fmt(o._ordered))+' '+esc(o.unit||'')+'</b></div><div class="cell"><span>Delivered</span><b>'+esc(fmt(o._delivered))+' '+esc(o.unit||'')+'</b></div><div class="cell"><span>Qty Left</span><b>'+esc(fmt(o._left))+' '+esc(o.unit||'')+'</b></div><div class="cell"><span>Order</span><b>'+esc((o.site||'')+' / '+(o.material||''))+'</b></div></div></article>'}).join('')+'</div></section>'}).join('');
$('orders').innerHTML=html||'<div class="empty">No orders downloaded yet. Press Download Orders.</div>'}
load();render();setTimeout(function(){if(navigator.onLine!==false)downloadOrders();else msg('Offline. Showing saved orders from phone.','error')},300);if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js?v=1.0.0').catch(function(){});
})();
</script></body></html>
